##  Example ACQ4 configuration file.
##

# Extra ACQ4 extensions to load before parsing the rest of the config
imports: []

# Some drivers may have config options here
# devices:
#    manufacturer:
#        option: value

# Devices are defined in another config file:
devices: readConfigFile('devices.cfg') 
        
modules:
    Data Manager:
        module:  'DataManager'
        shortcut: 'F2'
    Task Runner:
        module: 'TaskRunner'
        shortcut: 'F6'
        config:
            ## Directory where Task Runner stores its saved tasks.
            taskDir: 'config/example/protocols'
    Camera:
        module: 'Camera'
        shortcut: 'F5'
    MultiPatch:
        module: 'MultiPatch'
        config:
            # Turns on controls for mocking the patch process (for testing)
            enableMockPatch: True
    ## Deprecated module, use MultiPatch instead
    # Patch 1:
    #     module: 'Patch'
    #     shortcut: 'F3'
    #     config:
    #         clampDev: 'Clamp1'
    Visualize3D:
        module: 'Visualize3D'
    Console:
        module: 'Console'
        config: None
    Imager:
        module: 'Imager'
        config:
            # Names of modules and devices needed by the Imager
            cameraModule: 'Camera'
            scanner: 'Scanner'
            laser: 'Laser-UV'
            detector: 'PMT', 'Input'
            mockDetector: True
            attenuator: 'PockelsCell', 'Switch'
    TaskMonitor:
        module: 'TaskMonitor'

misc:
    # Multiple patch profiles can be defined here. The 'default' profile
    # will be used unless another profile is specified. See the parameters
    # in acq4/devices/PatchPipette/states/
    patchProfiles:
        default:
            bath:
                initialPressure: 3.5*kPa
                initialPressureSource: 'regulator'
                initialClampMode: 'VC'
                initialVCHolding: 0*mV
                initialTestPulseEnable: True
            approach:
                takeACellfie: False
            cell detect:
                minDetectionDistance: 1*m
        autodetect:
            copyFrom: 'default'
            approach:
                autoAdvance: True
                obstacleDetection: True
            cell detect:
                autoAdvance: True
                advanceMode: 'target'

    ## Should camera image processing make use of CUDA-enabled gpus
    cudaImageProcessing: True

    ## Default compression method to use when writing HDF5 data files. Examples:
    ##   'gzip'        # Widely available filter, but slow
    ##   ('gzip', 1)   # Same filter with compression level given (0-9)
    ##   'lzf'         # Fastest compression; generally only available with h5py
    ##   'szip'        # Proprietary filter; faster but not available everywhere
    ##   None          # No compression
    ## By default, we disable compression because 'gzip' is too slow and
    ## 'lzf' / 'szip' are not available on all HDF5 installations.
    defaultCompression: None

    ## Defines the folder types that are available when creating a new folder via
    ## the Data Manager. Each folder type consists of a set of metadata fields
    ## that will be created with the folder.
    folderTypes: readConfigFile('folderTypes.cfg')

    ## Base directory where ACQ4 will keep acquired data. It is recommended
    ## that experimenters create a hierarchy of folders within this directory to
    ## organize their data.
    # storageDir: '/home/user/data'

    ## Directory where cell health annotations (from the AutomationDebug "Detect
    ## Neurons" workflow) are saved. Each annotation session is written to a
    ## uniquely-named file here. If unset, defaults to a 'cell_annotations'
    ## subdirectory of the `storageDir` set above.
    # cellAnnotationDir: '/home/user/data/cell_annotations'

    ## Health-model paths used by the AutomationDebug "Detect Neurons" workflow for
    ## both detection and the per-cell predictions shown in the annotation tool.
    ## Provide either a resnetClassifierPath (scores crops end-to-end) or an
    ## autoencoderPath + classifierPath pair; resnetClassifierPath takes precedence.
    # segmenterPath: '/path/to/segmenter'
    # autoencoderPath: '/path/to/autoencoder.pt'
    # classifierPath: '/path/to/classifier.joblib'
    # resnetClassifierPath: '/path/to/resnet-classifier.pt'

    ## Ascending score cutoffs (one fewer than the 6 rating bins, i.e. 5) that map a
    ## ranking model's raw scores onto the 0-5 rating scale in the annotation tool.
    ## Health models usually only rank cells, so raw scores aren't calibrated
    ## probabilities; derive cutoffs for a given model+corpus with
    ## `python -m acq4_automation.compute_score_cutoffs <corpus> --resnet-classifier <model>`.
    ## If unset, scores are binned with fixed equal-width bins.
    # scoreCutoffs: [0.000136, 0.001249, 0.012659, 0.073959, 0.148094]

configurations:
    User_1:
        storageDir: '/home/user/data/user1'
    User_2:
        storageDir: '/home/user/data/user2'

motionPlanner:
    class: "acq4.motion.DefaultMotionPlanner"

## For controlling the appearance of the GUI:
stylesheet: 'style.css'
